<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg1)"/>

  <!-- Grid lines -->
  <line x1="80" y1="60" x2="80" y2="340" stroke="#334155" stroke-width="1"/>
  <line x1="80" y1="340" x2="720" y2="340" stroke="#334155" stroke-width="1"/>
  <line x1="80" y1="260" x2="720" y2="260" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="180" x2="720" y2="180" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="100" x2="720" y2="100" stroke="#1e293b" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Y-axis labels -->
  <text x="65" y="345" font-family="monospace" font-size="11" fill="#64748b" text-anchor="end">0</text>
  <text x="65" y="265" font-family="monospace" font-size="11" fill="#64748b" text-anchor="end">25</text>
  <text x="65" y="185" font-family="monospace" font-size="11" fill="#64748b" text-anchor="end">50</text>
  <text x="65" y="105" font-family="monospace" font-size="11" fill="#64748b" text-anchor="end">75</text>

  <!-- Scatter plot dots – trip data points -->
  <circle cx="130" cy="290" r="4" fill="#2563eb" fill-opacity="0.7"/>
  <circle cx="160" cy="260" r="5" fill="#2563eb" fill-opacity="0.8"/>
  <circle cx="200" cy="230" r="4" fill="#6366f1" fill-opacity="0.7"/>
  <circle cx="230" cy="200" r="6" fill="#2563eb" fill-opacity="0.9"/>
  <circle cx="270" cy="210" r="4" fill="#6366f1" fill-opacity="0.6"/>
  <circle cx="310" cy="180" r="5" fill="#2563eb" fill-opacity="0.8"/>
  <circle cx="350" cy="155" r="4" fill="#6366f1" fill-opacity="0.7"/>
  <circle cx="390" cy="140" r="6" fill="#2563eb" fill-opacity="0.9"/>
  <circle cx="430" cy="160" r="4" fill="#6366f1" fill-opacity="0.7"/>
  <circle cx="470" cy="130" r="5" fill="#2563eb" fill-opacity="0.8"/>
  <circle cx="510" cy="120" r="4" fill="#6366f1" fill-opacity="0.7"/>
  <circle cx="550" cy="110" r="6" fill="#2563eb" fill-opacity="0.9"/>
  <circle cx="590" cy="100" r="4" fill="#6366f1" fill-opacity="0.6"/>
  <circle cx="630" cy="95"  r="5" fill="#2563eb" fill-opacity="0.8"/>
  <circle cx="670" cy="85"  r="4" fill="#6366f1" fill-opacity="0.7"/>

  <!-- Regression line -->
  <line x1="120" y1="300" x2="690" y2="80" stroke="url(#barGrad)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Bar chart at the bottom (feature importance) -->
  <rect x="110" y="360" width="50" height="12" rx="3" fill="url(#barGrad)" fill-opacity="0.8"/>
  <rect x="180" y="360" width="70" height="12" rx="3" fill="url(#barGrad)" fill-opacity="0.8"/>
  <rect x="270" y="360" width="40" height="12" rx="3" fill="url(#barGrad)" fill-opacity="0.8"/>
  <rect x="330" y="360" width="90" height="12" rx="3" fill="url(#barGrad)" fill-opacity="0.8"/>
  <rect x="440" y="360" width="55" height="12" rx="3" fill="url(#barGrad)" fill-opacity="0.8"/>

  <!-- Labels -->
  <text x="135" y="372" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">dist</text>
  <text x="215" y="372" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">surge</text>
  <text x="290" y="372" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">time</text>
  <text x="375" y="372" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">weather</text>
  <text x="468" y="372" font-family="monospace" font-size="9" fill="#94a3b8" text-anchor="middle">rating</text>

  <!-- Title badge -->
  <rect x="80" y="18" width="260" height="26" rx="6" fill="#2563eb" fill-opacity="0.2" stroke="#2563eb" stroke-opacity="0.4" stroke-width="1"/>
  <text x="210" y="35" font-family="Poppins,sans-serif" font-size="12" font-weight="600" fill="#93c5fd" text-anchor="middle">Uber Ride Prediction Model</text>

  <!-- Accuracy badge -->
  <rect x="590" y="18" width="130" height="26" rx="6" fill="#16a34a" fill-opacity="0.2" stroke="#16a34a" stroke-opacity="0.4" stroke-width="1"/>
  <text x="655" y="35" font-family="monospace" font-size="12" font-weight="700" fill="#86efac" text-anchor="middle">Accuracy: 87%</text>
</svg>
