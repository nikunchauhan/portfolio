<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="g3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#g3)"/>
  <!-- Sun -->
  <circle cx="400" cy="140" r="70" fill="#fbbf24" fill-opacity="0.9"/>
  <!-- Rays -->
  <line x1="400" y1="50" x2="400" y2="30" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
  <line x1="490" y1="80" x2="506" y2="64" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
  <line x1="520" y1="170" x2="542" y2="170" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
  <line x1="490" y1="200" x2="506" y2="216" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
  <line x1="310" y1="80" x2="294" y2="64" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
  <line x1="280" y1="170" x2="258" y2="170" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
  <!-- Cloud -->
  <ellipse cx="550" cy="180" rx="90" ry="40" fill="white" fill-opacity="0.2"/>
  <ellipse cx="510" cy="170" rx="60" ry="35" fill="white" fill-opacity="0.2"/>
  <!-- Temp text -->
  <text x="400" y="290" font-family="Poppins,sans-serif" font-size="60" font-weight="700"
        fill="white" text-anchor="middle">24°C</text>
  <text x="400" y="330" font-family="Poppins,sans-serif" font-size="20"
        fill="rgba(255,255,255,0.6)" text-anchor="middle">New York, USA</text>
  <text x="400" y="420" font-family="Poppins,sans-serif" font-size="18" font-weight="600"
        fill="#fbbf24" fill-opacity="0.8" text-anchor="middle">Weather App</text>
</svg>
