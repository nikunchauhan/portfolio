<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a00"/>
      <stop offset="100%" style="stop-color:#2d1200"/>
    </linearGradient>
    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
  </defs>
  <!-- Dark warm background -->
  <rect width="800" height="450" fill="url(#bg2)"/>

  <!-- Brick wall texture -->
  <!-- Row 1 -->
  <rect x="0"   y="0"   width="198" height="44" rx="2" fill="#7c2d12" stroke="#431407" stroke-width="1.5"/>
  <rect x="202" y="0"   width="198" height="44" rx="2" fill="#7c2d12" stroke="#431407" stroke-width="1.5"/>
  <rect x="404" y="0"   width="198" height="44" rx="2" fill="#7c2d12" stroke="#431407" stroke-width="1.5"/>
  <rect x="606" y="0"   width="198" height="44" rx="2" fill="#7c2d12" stroke="#431407" stroke-width="1.5"/>
  <!-- Row 2 (offset) -->
  <rect x="-100" y="48" width="198" height="44" rx="2" fill="#92400e" stroke="#431407" stroke-width="1.5"/>
  <rect x="102"  y="48" width="198" height="44" rx="2" fill="#92400e" stroke="#431407" stroke-width="1.5"/>
  <rect x="304"  y="48" width="198" height="44" rx="2" fill="#92400e" stroke="#431407" stroke-width="1.5"/>
  <rect x="506"  y="48" width="198" height="44" rx="2" fill="#92400e" stroke="#431407" stroke-width="1.5"/>
  <rect x="708"  y="48" width="198" height="44" rx="2" fill="#92400e" stroke="#431407" stroke-width="1.5"/>
  <!-- Row 3 -->
  <rect x="0"   y="96"  width="198" height="44" rx="2" fill="#7c2d12" stroke="#431407" stroke-width="1.5"/>
  <rect x="202" y="96"  width="198" height="44" rx="2" fill="#7c2d12" stroke="#431407" stroke-width="1.5"/>
  <rect x="404" y="96"  width="198" height="44" rx="2" fill="#7c2d12" stroke="#431407" stroke-width="1.5"/>
  <rect x="606" y="96"  width="198" height="44" rx="2" fill="#7c2d12" stroke="#431407" stroke-width="1.5"/>
  <!-- Row 4 (offset) -->
  <rect x="-100" y="144" width="198" height="44" rx="2" fill="#92400e" stroke="#431407" stroke-width="1.5"/>
  <rect x="102"  y="144" width="198" height="44" rx="2" fill="#92400e" stroke="#431407" stroke-width="1.5"/>
  <rect x="304"  y="144" width="198" height="44" rx="2" fill="#92400e" stroke="#431407" stroke-width="1.5"/>
  <rect x="506"  y="144" width="198" height="44" rx="2" fill="#92400e" stroke="#431407" stroke-width="1.5"/>
  <rect x="708"  y="144" width="198" height="44" rx="2" fill="#92400e" stroke="#431407" stroke-width="1.5"/>

  <!-- Dark overlay on lower half for contrast -->
  <rect x="0" y="200" width="800" height="250" fill="rgba(0,0,0,0.65)"/>

  <!-- Menu board on wall -->
  <rect x="260" y="20" width="280" height="155" rx="8" fill="#1c0a00" stroke="#f97316" stroke-width="2" fill-opacity="0.9"/>
  <text x="400" y="48" font-family="serif" font-size="18" font-weight="700" fill="#f97316" text-anchor="middle">🍽  MENU</text>
  <line x1="275" y1="56" x2="525" y2="56" stroke="#f97316" stroke-width="1" stroke-opacity="0.5"/>
  <text x="290" y="76"  font-family="sans-serif" font-size="12" fill="#fde68a">Margherita Pizza</text>
  <text x="510" y="76"  font-family="sans-serif" font-size="12" fill="#fde68a" text-anchor="end">₹ 299</text>
  <text x="290" y="96"  font-family="sans-serif" font-size="12" fill="#fde68a">Pasta Arrabbiata</text>
  <text x="510" y="96"  font-family="sans-serif" font-size="12" fill="#fde68a" text-anchor="end">₹ 249</text>
  <text x="290" y="116" font-family="sans-serif" font-size="12" fill="#fde68a">Grilled Sandwich</text>
  <text x="510" y="116" font-family="sans-serif" font-size="12" fill="#fde68a" text-anchor="end">₹ 179</text>
  <text x="290" y="136" font-family="sans-serif" font-size="12" fill="#fde68a">Chocolate Brownie</text>
  <text x="510" y="136" font-family="sans-serif" font-size="12" fill="#fde68a" text-anchor="end">₹ 149</text>
  <text x="290" y="156" font-family="sans-serif" font-size="12" fill="#fde68a">Cold Coffee</text>
  <text x="510" y="156" font-family="sans-serif" font-size="12" fill="#fde68a" text-anchor="end">₹ 129</text>

  <!-- Hanging pendant lamp -->
  <line x1="400" y1="0" x2="400" y2="200" stroke="#4b5563" stroke-width="3"/>
  <ellipse cx="400" cy="210" rx="38" ry="18" fill="#111827"/>
  <ellipse cx="400" cy="210" rx="28" ry="10" fill="#1f2937"/>
  <!-- Glow under lamp -->
  <ellipse cx="400" cy="240" rx="100" ry="30" fill="#f97316" fill-opacity="0.12"/>

  <!-- Table with food -->
  <rect x="150" y="360" width="500" height="18" rx="4" fill="#374151"/>
  <rect x="200" y="340" width="400" height="25" rx="4" fill="#4b5563"/>

  <!-- Plate -->
  <ellipse cx="400" cy="345" rx="55" ry="14" fill="#e5e7eb"/>
  <ellipse cx="400" cy="343" rx="42" ry="10" fill="#f9fafb"/>
  <!-- Food on plate -->
  <circle cx="390" cy="341" r="12" fill="#dc2626" fill-opacity="0.8"/>
  <circle cx="410" cy="341" r="10" fill="#f97316" fill-opacity="0.7"/>
  <!-- Fork & knife -->
  <line x1="340" y1="328" x2="340" y2="360" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="460" y1="328" x2="460" y2="360" stroke="#9ca3af" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Wine glass silhouettes -->
  <ellipse cx="520" cy="348" rx="14" ry="6" fill="none" stroke="#93c5fd" stroke-width="1.5" stroke-opacity="0.6"/>
  <path d="M510,348 Q510,330 520,325 Q530,330 530,348" fill="#93c5fd" fill-opacity="0.15" stroke="#93c5fd" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="520" y1="348" x2="520" y2="362" stroke="#93c5fd" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Candle on table -->
  <rect x="274" y="330" width="8" height="20" rx="2" fill="#fef3c7"/>
  <ellipse cx="278" cy="328" rx="4" ry="6" fill="#fbbf24" fill-opacity="0.8"/>
  <ellipse cx="278" cy="340" rx="18" ry="8" fill="#f97316" fill-opacity="0.1"/>

  <!-- Title badge -->
  <rect x="0" y="400" width="800" height="50" fill="rgba(0,0,0,0.5)"/>
  <text x="400" y="432" font-family="Poppins,sans-serif" font-size="16" font-weight="700" fill="#f97316" text-anchor="middle">Restaurant Web Application</text>
</svg>
